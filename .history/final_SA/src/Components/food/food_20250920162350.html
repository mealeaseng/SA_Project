<!-- Food Menu Section -->
<div class="px-4 py-8 bg-gray-50 min-h-screen">
  <h2 class="text-3xl font-bold mb-8 text-center text-blue-700">🍽️ Food Menu</h2>

  <!-- Product List -->
  <div class="flex flex-wrap justify-center gap-6">
    <div
      *ngFor="let product of product_item; trackBy: trackProduct"
      class="bg-red-100 w-full sm:w-[300px] p-5 rounded-xl shadow-md hover:shadow-xl transition-all duration-300 ease-in-out hover:bg-red-200 text-center"
    >
      <img
        [src]="product.img"
        [alt]="product.name"
        class="w-40 h-40 object-cover mx-auto mb-4 rounded-lg shadow transition-transform duration-300 hover:scale-105"
      />
      <div class="text-lg font-semibold text-blue-700 mb-1">{{ product.name }}</div>
      <div class="text-green-600 font-bold text-sm mb-2">
        Price: {{ product.price | currency : 'USD' }}
      </div>
      <div class="text-gray-600 text-sm mb-4">{{ product.description }}</div>
      <button
        (click)="addToCart(product)"
        class="mt-auto px-6 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 hover:scale-105 transition-all duration-200 ease-in-out uppercase text-sm tracking-wide"
        aria-label="Add {{ product.name }} to cart"
      >
        Add to Cart ({{ getCartQty(product) }})
      </button>
    </div>
  </div>

  <!-- Floating Payment Button -->
  <div class="fixed bottom-6 right-6">
    <button
      (click)="openPayment()"
      class="bg-blue-500 text-white px-6 py-3 rounded-full shadow-lg hover:bg-blue-600 hover:scale-110 transition-all"
    >
      💳 Payment
    </button>
  </div>

  <!-- Payment Modal -->
  <div
    *ngIf="showPayment"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  >
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-lg w-full">
      <h2 class="text-2xl font-bold text-blue-700 mb-4">Payment Summary</h2>

      <!-- If cart empty -->
      <div *ngIf="cart.length === 0" class="text-gray-500 text-center py-6">
        Your cart is empty.
      </div>

      <!-- Cart items -->
      <div *ngFor="let item of cart" class="flex justify-between py-2 border-b">
        <span>{{ item.name }} (x{{ item.qty }})</span>
        <span>{{ item.price * item.qty | currency : 'USD' }}</span>
      </div>

      <!-- Total -->
      <div *ngIf="cart.length > 0" class="text-right font-bold text-xl mt-4 text-blue-700">
        Total: {{ getTotal() | currency : 'USD' }}
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-4 mt-6">
        <button (click)="closePayment()" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">
          Cancel
        </button>
        <button
          (click)="confirmPayment()"
          [disabled]="cart.length === 0"
          class="px-4 py-2 bg-green-500 text-white rounded-lg shadow hover:bg-green-600 disabled:bg-gray-300"
        >
          Confirm Payment
        </button>
      </div>
    </div>
  </div>
</div>
