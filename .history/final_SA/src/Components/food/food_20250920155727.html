<!-- Food Menu Section -->
<div class="px-4 py-8 bg-gray-50 min-h-screen">
  <h2 class="text-3xl font-bold mb-8 text-center text-blue-700">🍽️ Food Menu</h2>

  <!-- Product List -->
  <div class="flex flex-wrap justify-center gap-6">
    <div
      *ngFor="let product of product_item; trackBy: trackProduct"
      class="bg-red-100 w-full sm:w-[300px] p-5 rounded-xl shadow-md hover:shadow-xl transition-all duration-300 ease-in-out hover:bg-red-200 text-center"
    >
      <img
        [src]="product.img"
        [alt]="product.name"
        class="w-40 h-40 object-cover mx-auto mb-4 rounded-lg shadow transition-transform duration-300 hover:scale-105"
      />
      <div class="text-lg font-semibold text-blue-700 mb-1">{{ product.name }}</div>
      <div class="text-green-600 font-bold text-sm mb-2">
        Price: {{ product.price | currency : 'USD' }}
      </div>
      <div class="text-gray-600 text-sm mb-4">{{ product.description }}</div>
      <button
        (click)="addToCart(product)"
        class="mt-auto px-6 py-2 bg-blue-500 text-white rounded-lg shadow hover:bg-blue-600 hover:scale-105 transition-all duration-200 ease-in-out uppercase text-sm tracking-wide"
        aria-label="Add {{ product.name }} to cart"
      >
        Add to Cart
        <span>{{ qty }}</span>
      </button>
    </div>
  </div>

  <!-- Cart Section -->
  <h2 class="text-3xl font-bold mt-16 mb-6 text-center text-blue-700">🛒 Your Cart</h2>
  <div class="bg-white p-6 rounded-xl shadow-lg max-w-3xl mx-auto">
    <!-- Empty Cart -->
    <div *ngIf="cart.length === 0" class="text-center text-gray-400 py-8 text-base">
      Cart is empty
    </div>

    <!-- Cart Items -->
    <div
      *ngFor="let item of cart; let i = index"
      class="flex items-center justify-between mb-4 p-4 border border-gray-200 rounded-lg bg-gray-50 shadow-sm"
    >
      <div class="flex items-center space-x-4">
        <img
          [src]="item.img"
          [alt]="item.name"
          class="w-12 h-12 rounded-lg object-cover border border-gray-200"
        />
        <div>
          <div class="font-semibold text-gray-800 text-sm">{{ item.name }}</div>
          <div class="text-green-600 text-sm font-medium">{{ item.price | currency : 'USD' }}</div>
        </div>
      </div>
      <button
        (click)="removeFromCart(i)"
        class="text-red-500 hover:text-red-700 transition duration-200 text-sm font-medium hover:scale-105"
        aria-label="Remove {{ item.name }} from cart"
      >
        ❌ Remove
      </button>
    </div>

    <!-- Cart Footer -->
    <div *ngIf="cart.length > 0" class="mt-6 text-right">
      <div class="font-bold text-xl text-blue-700 mb-4">
        Total: {{ getTotal() | currency : 'USD' }}
      </div>
      <div class="flex justify-end gap-4 flex-wrap">
        <button
          (click)="clearCart()"
          class="px-6 py-2 bg-red-500 text-white rounded-lg shadow hover:bg-red-600 hover:scale-105 transition-all text-sm uppercase tracking-wide"
          aria-label="Clear cart"
        >
          Clear Cart
        </button>

        <!-- Optional: Add Checkout Button -->
        <!--
        <button
          class="px-6 py-2 bg-green-500 text-white rounded-lg shadow hover:bg-green-600 hover:scale-105 transition-all text-sm uppercase tracking-wide"
        >
          Checkout
        </button>
        -->
      </div>
    </div>
  </div>
</div>
