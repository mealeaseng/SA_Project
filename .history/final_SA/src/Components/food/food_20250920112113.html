<!-- Food Menu Section -->
<div>
  <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">🍽️ Food Menu</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div
      *ngFor="let product of product_item; trackBy: trackProduct"
      class="p-6 border rounded-lg shadow-xl text-center bg-white hover:shadow-2xl transition-all duration-300 ease-in-out"
    >
      <img
        [src]="product.img"
        [alt]="product.name"
        class="w-48 h-48 object-cover mx-auto mb-4 rounded-lg transition-transform duration-300 ease-in-out hover:scale-105"
      />
      <div class="text-lg font-semibold text-blue-600">{{ product.name }}</div>
      <div class="text-green-600 font-bold">{{ product.price | currency : 'USD' }}</div>
      <div class="text-gray-700 text-sm mt-2">{{ product.description }}</div>
      <button
        (click)="addToCart(product)"
        class="mt-4 px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition duration-200"
        aria-label="Add {{ product.name }} to cart"
      >
        Add to Cart
      </button>
    </div>
  </div>

  <!-- Cart Section -->
  <h2 class="text-2xl font-bold mt-12 mb-6 text-center text-blue-700">🛒 Your Cart</h2>
  <div class="bg-gray-50 p-6 rounded-lg shadow-lg max-w-3xl mx-auto">
    <div *ngIf="cart.length === 0" class="text-gray-500 text-center py-6">Your cart is empty</div>

    <div
      *ngFor="let item of cart; let i = index"
      class="flex items-center justify-between mb-6 p-4 border-b border-gray-300 rounded-lg"
    >
      <div class="flex items-center space-x-4">
        <img [src]="item.img" [alt]="item.name" class="w-16 h-16 object-cover rounded-lg" />
        <div>
          <div class="font-semibold text-gray-800">{{ item.name }}</div>
          <div class="text-green-600 font-semibold">{{ item.price | currency : 'USD' }}</div>
        </div>
      </div>
      <button
        (click)="removeFromCart(i)"
        class="text-red-600 hover:text-red-800 transition duration-200"
        aria-label="Remove {{ item.name }} from cart"
      >
        ❌ Remove
      </button>
    </div>

    <div *ngIf="cart.length > 0" class="text-right mt-6">
      <div class="font-semibold text-xl text-gray-800 mb-4">
        Total: <span class="text-blue-600">{{ getTotal() | currency : 'USD' }}</span>
      </div>
      <div class="flex justify-end space-x-4">
        <button
          (click)="clearCart()"
          class="px-6 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 transition duration-200"
          aria-label="Clear cart"
        >
          Clear Cart
        </button>
        <button
          (click)="proceedToCheckout()"
          class="px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition duration-200"
          aria-label="Proceed to Checkout"
        >
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>
</div>
