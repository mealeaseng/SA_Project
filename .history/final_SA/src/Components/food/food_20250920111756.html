<!-- 🛒 Cart Section -->
<h2 class="text-3xl font-bold mt-12 mb-6 text-center text-blue-700">🛒 Your Cart</h2>

<div class="bg-white p-6 rounded-lg shadow-lg max-w-4xl mx-auto">
  <!-- Empty Cart Message -->
  <div *ngIf="cart.length === 0" class="text-gray-500 text-center text-lg py-6">
    Your cart is currently empty. Start adding delicious items!
  </div>

  <!-- Cart Items -->
  <div
    *ngFor="let item of cart; let i = index"
    class="flex items-center justify-between gap-4 mb-6 border-b pb-4"
  >
    <div class="flex items-center gap-4">
      <img [src]="item.img" [alt]="item.name" class="w-16 h-16 object-cover rounded-lg border" />
      <div>
        <h3 class="text-lg font-semibold text-gray-800">{{ item.name }}</h3>
        <p class="text-green-600 font-medium">{{ item.price | currency : 'USD' }}</p>
      </div>
    </div>
    <button
      (click)="removeFromCart(i)"
      class="text-red-500 hover:text-red-700 transition-colors duration-200"
      aria-label="Remove {{ item.name }} from cart"
    >
      ❌ Remove
    </button>
  </div>

  <!-- Cart Summary -->
  <div *ngIf="cart.length > 0" class="text-right mt-6">
    <div class="text-xl font-bold text-gray-800">
      Total: <span class="text-green-700">{{ getTotal() | currency : 'USD' }}</span>
    </div>
    <button
      (click)="clearCart()"
      class="mt-4 px-6 py-2 bg-red-500 text-white font-medium rounded hover:bg-red-600 transition"
      aria-label="Clear cart"
    >
      🧹 Clear Cart
    </button>
  </div>
</div>
