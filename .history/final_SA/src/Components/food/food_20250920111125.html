<div>
  @for (product of product_item; track product) {
  <div class="p-4 border rounded shadow-md mb-4 text-center">
    <img [src]="product.img" alt="{{ product.name }}" class="w-40 h-40 object-cover mx-auto mb-2" />

    <div class="text-lg font-bold text-blue-600">
      {{ product.name }}
    </div>

    <div class="text-green-600 font-semibold">
      {{ product.price }}
    </div>

    <div class="text-gray-600">
      {{ product.description }}
    </div>

    <button class="mt-3 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
      Add to Cart
    </button>
  </div>
  }
</div>
