<!-- Food Menu Section -->
<div>
  <h2 class="text-2xl font-bold mb-4 text-center text-blue-700">🍽️ Food Menu</h2>
  <div class="flex">
    <div
      *ngFor="let product of product_item; trackBy: trackProduct"
      class="p-4 border rounded shadow-md text-center bg-red-100 w-[300px]"
    >
      <img
        [src]="product.img"
        [alt]="product.name"
        class="w-40 h-40 object-cover mx-auto mb-2 rounded transition-transform duration-300 hover:scale-105"
      />
      <div class="text-lg font-bold text-blue-600">{{ product.name }}</div>
      <div class="text-green-600 font-semibold">{{ product.price | currency : 'USD' }}</div>
      <div class="text-gray-600 text-sm">{{ product.description }}</div>
      <button
        (click)="addToCart(product)"
        class="mt-3 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition"
        aria-label="Add {{ product.name }} to cart"
      >
        Add to Cart
      </button>
    </div>
  </div>

  <!-- Cart Section -->
  <h2 class="text-2xl font-bold mt-10 mb-4 text-center text-blue-700">🛒 Your Cart</h2>
  <div class="bg-gray-100 p-4 rounded shadow-md max-w-3xl mx-auto">
    <div *ngIf="cart.length === 0" class="text-gray-500 text-center">Cart is empty</div>

    <div
      *ngFor="let item of cart; let i = index"
      class="flex items-center justify-between mb-3 p-2 border-b"
    >
      <div class="flex items-center space-x-3">
        <img [src]="item.img" [alt]="item.name" class="w-12 h-12 object-cover rounded" />
        <div>
          <div class="font-semibold">{{ item.name }}</div>
          <div class="text-green-600">{{ item.price | currency : 'USD' }}</div>
        </div>
      </div>
      <button
        (click)="removeFromCart(i)"
        class="text-red-500 hover:text-red-700"
        aria-label="Remove {{ item.name }} from cart"
      >
        ❌ Remove
      </button>
    </div>

    <div *ngIf="cart.length > 0" class="text-right mt-4">
      <div class="font-bold text-lg">Total: {{ getTotal() | currency : 'USD' }}</div>
      <button
        (click)="clearCart()"
        class="mt-2 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600"
        aria-label="Clear cart"
      >
        Clear Cart
      </button>
    </div>
  </div>
</div>
