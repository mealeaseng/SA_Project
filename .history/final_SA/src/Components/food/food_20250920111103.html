<div>
  @for (product of product_item; track product) {
  <div class="p-4 border rounded shadow-md mb-4 text-center">
    <img [src]="product.img" alt="{{ product.name }}" class="w-40 h-40 object-cover mx-auto mb-2" />
    <div class="text-lg font-bold text-blue-600">
      {{ product.name }}
    </div>
    <div>
      {{ product.price }}
    </div>
    <div>
      {{ product.description }}
    </div>
  </div>
  <button>Add to Cart</button>
  }
</div>
