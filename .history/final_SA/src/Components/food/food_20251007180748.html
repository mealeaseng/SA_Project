<div class="flex flex-col items-center justify-center min-h-screen bg-gray-50 px-4 py-8">
  <h2 class="text-3xl font-bold mb-8 text-center text-blue-700">🍽️ Food Menu</h2>

  <!-- Product Cards Grid -->
  <div
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 justify-items-center"
  >
    <div
      *ngFor="let product of products_foods; trackBy: trackProduct"
      class="bg-white w-full max-w-xs p-5 rounded-2xl shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col items-center"
    >
      <img
        [src]="product.img"
        [alt]="product.name"
        class="w-40 h-40 object-cover rounded-xl shadow-md mb-4 transform transition-transform duration-300 hover:scale-105"
      />

      <h3 class="text-xl font-bold text-blue-700 mb-2 text-center">{{ product.name }}</h3>

      <p class="text-green-600 font-semibold mb-2">{{ product.price | currency : 'USD' }}</p>

      <p class="text-gray-600 text-sm mb-4 text-center line-clamp-2">{{ product.description }}</p>

      <button
        (click)="addToCart(product)"
        class="w-full px-4 py-2 bg-blue-500 text-white font-semibold rounded-xl shadow hover:bg-blue-600 hover:scale-105 transition transform duration-200"
      >
        🛒 Add to Cart ({{ getCartQty(product) }})
      </button>
    </div>
  </div>

  <!-- Floating Cart / Payment Button -->
  <div class="fixed bottom-6 right-6 z-50">
    <button
      routerLink="/payment"
      class="flex items-center gap-2 px-5 py-3 bg-blue-500 text-white rounded-full shadow-lg hover:bg-blue-600 hover:scale-110 transition transform"
    >
      💳 Go to Payment ({{ cartFood.length }})
    </button>
  </div>
</div>
