<div class="max-w-4xl mx-auto p-6">
  <!-- Header -->
  <div class="text-center mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Edit User Information</h2>
  </div>

  <!-- Form Container -->
  <div class="flex flex-col md:flex-row gap-8 items-start">
    <!-- Profile Image -->
    <div class="flex-shrink-0">
      <img
        src="https://www.iprcenter.gov/image-repository/blank-profile-picture.png/@@images/image.png"
        alt="Profile picture"
        class="rounded-full w-48 h-48 object-cover border-4 border-gray-200 shadow-sm"
      />
      <button
        type="button"
        class="mt-3 bg-blue w-full py-2 text-sm text-blue-600 font-medium hover:text-blue-800 transition"
      >
        Change Photo
      </button>
    </div>

    <!-- Form Fields -->
    <div class="flex-1 w-full">
      <form class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1"
            >Username</label
          >
          <input
            id="username"
            type="text"
            placeholder="Enter username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>

        <div>
          <label for="phone" class="block text-sm font-medium text-gray-700 mb-1"
            >Phone Number</label
          >
          <input
            id="phone"
            type="text"
            placeholder="(123) 456-7890"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1"
            >Password</label
          >
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1"
            >Confirm Password</label
          >
          <input
            id="confirmPassword"
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>

        <div>
          <label for="address" class="block text-sm font-medium text-gray-700 mb-1">Address</label>
          <input
            id="address"
            type="text"
            placeholder="123 Main St, City"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
          />
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button
            (click)="saveChange()"
            [disabled]="!isLoggedIn"
            type="submit"
            class="w-full py-3 px-4 rounded-lg font-semibold text-white shadow-md transition duration-200 disabled:opacity-60 disabled:cursor-not-allowed disabled:shadow-none bg-blue-600 hover:bg-blue-700 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
          >
            Save Changes
          </button>
        </div>
        <div class="pt-4">
          <button
            (click)="remove()"
            [disabled]="!isLoggedIn"
            type="submit"
            class="w-full py-3 px-4 rounded-lg font-semibold text-white shadow-md transition duration-200 disabled:opacity-60 disabled:cursor-not-allowed disabled:shadow-none bg-red-600 hover:bg-red-700 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50"
          >
            Remove
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
