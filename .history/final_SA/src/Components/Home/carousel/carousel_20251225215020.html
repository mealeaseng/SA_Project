<div class="flex flex-col items-center justify-center w-full">
  <div class="relative w-full h-[500px] overflow-hidden">
    <!-- Slide Image -->
    <img
      [src]="slides[current].image"
      alt="Slide image"
      class="object-cover w-full h-full shadow-lg transition-transform duration-500 hover:scale-105"
    />

    <!-- Overlay for better text readability -->
    <div
      class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"
    ></div>

    <!-- Text Content -->
    <div
      data-aos="fade-up"
      data-aos-anchor-placement="bottom-bottom"
      class="absolute bottom-0 left-0 right-0 p-4 md:p-8"
    >
      <div class="container mx-auto">
        <div class="flex flex-col items-start space-y-2 md:space-y-4">
          <!-- Main Title -->
          <div class="flex items-center space-x-2 md:space-x-4">
            <h1 class="text-4xl md:text-7xl font-bold text-amber-300 tracking-tight drop-shadow-lg">
              MART
            </h1>

            <!-- Badge/Subtitle -->
            <div class="relative">
              <span
                class="text-2xl md:text-5xl font-bold text-white bg-amber-600/90 px-3 md:px-4 py-1 md:py-2 rounded-lg shadow-lg"
              >
                24/7
              </span>
              <div
                class="absolute -top-1 -right-1 w-3 h-3 md:w-4 md:h-4 bg-green-400 rounded-full animate-pulse"
              ></div>
            </div>
          </div>

          <!-- Description -->
          <p class="text-white text-lg md:text-2xl font-medium max-w-xl drop-shadow-lg">
            24/7 Convenience Store • Always Open For You
          </p>

          <!-- CTA Button -->
          <button
            class="mt-2 md:mt-4 px-6 py-2 md:px-8 md:py-3 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1"
          >
            Shop Now
            <svg
              class="w-4 h-4 md:w-5 md:h-5 inline-block ml-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 8l4 4m0 0l-4 4m4-4H3"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Navigation Dots (Optional) -->
    <div class="absolute bottom-4 right-4 flex space-x-2">
      <div
        *ngFor="let slide of slides; let i = index"
        (click)="goToSlide(i)"
        class="w-2 h-2 md:w-3 md:h-3 rounded-full cursor-pointer transition-all duration-300"
        [ngClass]="{
          'bg-amber-400': current === i,
          'bg-white/50': current !== i
        }"
      ></div>
    </div>
  </div>
</div>
