<div class="flex flex-col items-center justify-center w-full">
  <div
    class="relative w-full h-[400px] md:h-[600px] lg:h-[700px] overflow-hidden rounded-xl md:rounded-2xl shadow-2xl"
  >
    <!-- Slide Image with Transition -->
    <img
      [src]="slides[current].image"
      alt="Slide image"
      class="object-cover w-full h-full transition-opacity duration-1000 ease-in-out"
      [ngClass]="{ 'opacity-100': true, 'opacity-0': false }"
    />

    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>

    <!-- Navigation Arrows -->
    <button
      (click)="prevSlide()"
      class="absolute left-4 top-1/2 -translate-y-1/2 z-10 p-2 md:p-3 bg-black/30 hover:bg-black/50 backdrop-blur-sm rounded-full transition-all duration-300 group"
      aria-label="Previous slide"
    >
      <svg
        class="w-6 h-6 md:w-8 md:h-8 text-white group-hover:scale-110 transition-transform"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <button
      (click)="nextSlide()"
      class="absolute right-4 top-1/2 -translate-y-1/2 z-10 p-2 md:p-3 bg-black/30 hover:bg-black/50 backdrop-blur-sm rounded-full transition-all duration-300 group"
      aria-label="Next slide"
    >
      <svg
        class="w-6 h-6 md:w-8 md:h-8 text-white group-hover:scale-110 transition-transform"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <!-- Text Content -->
    <div
      data-aos="fade-up"
      data-aos-anchor-placement="bottom-bottom"
      data-aos-duration="800"
      class="absolute bottom-0 left-0 right-0 z-20 p-6 md:p-12"
    >
      <div class="container mx-auto">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 md:gap-8">
          <!-- Main Text -->
          <div class="space-y-3 md:space-y-4">
            <div class="flex flex-col md:flex-row md:items-baseline gap-3 md:gap-6">
              <h1
                class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black text-amber-300 leading-tight tracking-tight drop-shadow-2xl"
              >
                MART
              </h1>
              <div class="relative">
                <div
                  class="inline-flex items-center gap-2 bg-gradient-to-r from-amber-500 to-amber-600 px-4 py-2 md:px-6 md:py-3 rounded-xl shadow-2xl"
                >
                  <h2 class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold text-white">
                    24/7
                  </h2>
                  <div class="w-2 h-2 md:w-3 md:h-3 bg-green-400 rounded-full animate-pulse"></div>
                </div>
                <div
                  class="absolute -top-2 -right-2 w-4 h-4 md:w-6 md:h-6 bg-green-400/20 rounded-full animate-ping"
                ></div>
              </div>
            </div>

            <p
              class="text-white text-lg sm:text-xl md:text-2xl lg:text-3xl font-medium max-w-2xl drop-shadow-lg"
            >
              Your 24/7 Convenience Store • Always Open, Always Fresh
            </p>
          </div>

          <!-- CTA Button -->
          <button
            (click)="scrollToProducts()"
            class="self-start md:self-end px-6 py-3 md:px-8 md:py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-white font-bold rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 hover:scale-105 active:scale-95 text-lg md:text-xl"
          >
            <span class="flex items-center gap-2">
              Shop Now
              <svg
                class="w-5 h-5 md:w-6 md:h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 8l4 4m0 0l-4 4m4-4H3"
                ></path>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- Navigation Dots -->
    <div
      class="absolute bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 z-10 flex space-x-2 md:space-x-3"
    >
      <div
        *ngFor="let slide of slides; let i = index"
        (click)="goToSlide(i)"
        class="w-3 h-3 md:w-4 md:h-4 rounded-full cursor-pointer transition-all duration-300 backdrop-blur-sm"
        [ngClass]="{
          'bg-amber-400 shadow-lg scale-125': current === i,
          'bg-white/50 hover:bg-white/80': current !== i
        }"
        [attr.aria-label]="'Go to slide ' + (i + 1)"
      ></div>
    </div>

    <!-- Slide Counter -->
    <div
      class="absolute top-4 right-4 bg-black/40 backdrop-blur-sm text-white px-3 py-1 rounded-full text-sm md:text-base font-medium"
    >
      {{ current + 1 }} / {{ slides.length }}
    </div>
  </div>
</div>
