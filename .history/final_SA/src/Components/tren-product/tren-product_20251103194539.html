<div class="p-6 bg-gray-50 min-h-screen">
  <!-- Error -->
  <div *ngIf="error" class="text-center text-red-500">
    {{ error }}
  </div>

  <!-- Product Grid -->
  <div *ngIf="!loading && !error" class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
    <div *ngFor="let p of trendingProducts">
      <div
        class="absolute top-2 left-2 bg-yellow-300 text-yellow-800 text-xs font-bold px-2 py-1 rounded-md shadow-md"
      >
        <p>{{ p.name_product }}</p>
      </div>
      <div class="relative w-full h-40 flex justify-center items-center mb-4">
        <img [src]="p.img" alt="{{ p.name_product }}" class="max-h-40 object-contain rounded-xl" />
      </div>

      <h3 class="font-semibold text-gray-800 text-lg truncate w-full">
        {{ p.name_product }}
      </h3>

      <p class="text-green-600 font-semibold mt-1">💲{{ p.price | number : '1.2-2' }}</p>

      <p class="text-sm text-gray-500 mt-1">
        🛒 Sold: <span class="font-medium text-gray-700">{{ p.totalQty }}</span>
      </p>

      <!-- Discount badge -->
      <div
        *ngIf="p.discount > 0"
        class="mt-2 px-3 py-1 bg-red-100 text-red-600 text-xs font-semibold rounded-full"
      >
        -{{ p.discount }}% OFF
      </div>
    </div>
  </div>
</div>
