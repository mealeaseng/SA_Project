<div class="relative max-w-md mb-6">
  <label class="block text-sm font-medium text-gray-700 mb-2"> Search: </label>
  <div class="relative">
    <!-- Search Icon -->
    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <svg
        class="h-5 w-5 text-gray-400"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </div>

    <!-- Input Field -->
    <input
      type="text"
      [(ngModel)]="searchQuery"
      placeholder="Search product..."
      class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 bg-white text-gray-800 placeholder-gray-500 focus:outline-none"
    />

    <!-- Clear Button -->
    <button
      *ngIf="searchQuery"
      class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"
      type="button"
      (click)="clearSearch()"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
</div>

<!-- Display Products -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
  <div *ngFor="let product of filteredProducts" class="bg-white rounded-lg shadow p-4">
    <img
      [src]="product.img.trim()"
      [alt]="product.name_product"
      class="w-full h-48 object-cover rounded-md mb-3"
      (error)="onImageError($event)"
    />

    <h2 class="text-lg font-semibold">{{ product.name_product }}</h2>
    <p class="text-gray-500 text-sm mb-2">{{ product.dis }}</p>

    <div class="flex justify-between items-center">
      <p class="text-green-600 font-bold text-lg">
        ${{ product.price }}
        <span *ngIf="product.discount">(-{{ product.discount }}%)</span>
      </p>
      <p class="text-gray-400 text-sm">Stock: {{ product.stock }}</p>
    </div>
  </div>
</div>

<!-- No products message -->
<div *ngIf="filteredProducts.length === 0" class="text-center py-8 text-gray-500">
  <p>No products found matching your search.</p>
</div>
