<div class="max-w-xl mx-auto p-8 bg-white rounded-3xl shadow-xl">
  <!-- Header -->
  <h2 class="text-2xl font-bold flex items-center gap-2 text-slate-800 mb-6">⚙️ Settings</h2>

  <!-- Avatar -->
  <div class="flex flex-col items-center gap-4 mb-6">
    <img
      *ngIf="imagePreview; else avatar"
      [src]="imagePreview"
      class="w-24 h-24 rounded-full object-cover"
    />

    <ng-template #avatar>
      <img src="assets/avatar.png" class="w-24 h-24 rounded-full object-cover" />
    </ng-template>

    <label
      class="px-5 py-2 rounded-full bg-indigo-100 text-indigo-600 font-medium cursor-pointer hover:bg-indigo-200 transition"
    >
      Choose File
      <input type="file" accept="image/*" (change)="onImageSelect($event)" class="hidden" />
    </label>
  </div>

  <!-- Form -->
  <form [formGroup]="profileForm" class="space-y-4">
    <!-- Name -->
    <input
      formControlName="name"
      type="text"
      placeholder="Name"
      class="w-full px-4 py-3 rounded-2xl bg-slate-100 text-slate-800 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition"
    />

    <!-- Email -->
    <input
      formControlName="email"
      type="email"
      placeholder="Email"
      class="w-full px-4 py-3 rounded-2xl bg-slate-100 text-slate-800 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition"
    />

    <!-- Password -->
    <input
      formControlName="password"
      type="password"
      placeholder="New Password (optional)"
      class="w-full px-4 py-3 rounded-2xl bg-slate-100 text-slate-800 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition"
    />

    <!-- Save Button -->
    <button
      type="button"
      (click)="openConfirm()"
      [disabled]="profileForm.invalid"
      class="w-full mt-4 py-3 rounded-2xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      Save Changes
    </button>
  </form>
</div>
