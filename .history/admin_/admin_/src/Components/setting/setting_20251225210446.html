<div class="min-h-screen flex items-center justify-center bg-gray-200">
  <div class="flex w-[900px] rounded-3xl overflow-hidden shadow-xl bg-white">
    <!-- LEFT PANEL -->
    <div class="w-1/3 bg-blue-500 flex flex-col items-center justify-center text-white p-8">
      <img
        *ngIf="imagePreview; else avatar"
        [src]="imagePreview"
        class="w-28 h-28 rounded-full object-cover mb-4 border-4 border-white"
      />

      <ng-template #avatar>
        <div class="w-28 h-28 rounded-full bg-white/70 mb-4"></div>
      </ng-template>

      <h3 class="text-lg font-semibold">Admin Name</h3>
      <p class="text-sm opacity-80">Administrator</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="w-2/3 bg-rose-100 p-10">
      <form [formGroup]="profileForm" class="space-y-4">
        <input
          formControlName="name"
          type="text"
          placeholder="Name"
          class="w-full px-4 py-3 rounded-lg bg-white shadow-sm outline-none focus:ring-2 focus:ring-blue-400"
        />

        <input
          formControlName="email"
          type="email"
          placeholder="Email"
          class="w-full px-4 py-3 rounded-lg bg-white shadow-sm outline-none focus:ring-2 focus:ring-blue-400"
        />

        <input
          formControlName="password"
          type="password"
          placeholder="New Password"
          class="w-full px-4 py-3 rounded-lg bg-white shadow-sm outline-none focus:ring-2 focus:ring-blue-400"
        />

        <input
          formControlName="phone"
          type="text"
          placeholder="Phone"
          class="w-full px-4 py-3 rounded-lg bg-white shadow-sm outline-none focus:ring-2 focus:ring-blue-400"
        />

        <button
          type="button"
          (click)="openConfirm()"
          class="w-full mt-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition"
        >
          Save Changes
        </button>
      </form>
    </div>
  </div>
</div>
