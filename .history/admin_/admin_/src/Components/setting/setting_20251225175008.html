<div class="max-w-xl mx-auto p-6 bg-white rounded-2xl shadow">
  <h2 class="text-2xl font-bold mb-6">⚙️ Settings</h2>

  <form [formGroup]="profileForm" (ngSubmit)="submit()" class="space-y-4">
    <!-- Profile Image -->
    <div class="flex flex-col items-center gap-3">
      <img
        *ngIf="imagePreview"
        [src]="imagePreview"
        class="w-24 h-24 rounded-full object-cover border"
      />
      <input type="file" accept="image/*" (change)="onImageSelect($event)" />
    </div>

    <input formControlName="name" placeholder="Name" class="input" />
    <input formControlName="email" placeholder="Email" class="input" />
    <input type="password" formControlName="password" placeholder="New Password" class="input" />
    <input formControlName="phone" placeholder="Phone" class="input" />

    <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold">
      Save Changes
    </button>
  </form>
</div>
