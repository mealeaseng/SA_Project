<div class="max-w-xl mx-auto p-6 bg-white rounded-2xl shadow-lg">
  <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-gray-800">⚙️ Settings</h2>

  <form [formGroup]="profileForm" (ngSubmit)="submit()" class="space-y-5">
    <!-- Profile Image -->
    <div class="flex flex-col items-center gap-3">
      <img
        *ngIf="imagePreview; else noImage"
        [src]="imagePreview"
        class="w-24 h-24 rounded-full object-cover border border-gray-300"
      />

      <ng-template #noImage>
        <div
          class="w-24 h-24 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 border"
        >
          No Image
        </div>
      </ng-template>

      <input
        type="file"
        accept="image/*"
        (change)="onImageSelect($event)"
        class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100 cursor-pointer"
      />
    </div>

    <!-- Name -->
    <input
      formControlName="name"
      type="text"
      placeholder="Name"
      class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
    />

    <!-- Email -->
    <input
      formControlName="email"
      type="email"
      placeholder="Email"
      class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
    />

    <!-- Password -->
    <input
      formControlName="password"
      type="password"
      placeholder="New Password (optional)"
      class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
    />

    <!-- Phone -->
    <input
      formControlName="phone"
      type="text"
      placeholder="Phone number"
      class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
    />

    <!-- Submit -->
    <button
      type="popUp"
      [disabled]="profileForm.invalid"
      class="w-full py-3 rounded-xl font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 disabled:cursor-not-allowed transition"
    >
      Save Changes
    </button>

    <div>
      <button type="submit">Send</button>
    </div>
  </form>
</div>
