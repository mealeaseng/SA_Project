<div class="max-w-xl mx-auto p-6 bg-white rounded-2xl shadow-lg">
  <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-gray-800">⚙️ Settings</h2>

  <form [formGroup]="profileForm" class="space-y-5">
    <!-- Profile Image -->
    <div class="flex flex-col items-center gap-3">
      <img
        *ngIf="imagePreview; else noImage"
        [src]="imagePreview"
        class="w-24 h-24 rounded-full object-cover border"
      />

      <ng-template #noImage>
        <div class="w-24 h-24 rounded-full bg-gray-100 flex items-center justify-center">
          No Image
        </div>
      </ng-template>

      <input
        type="file"
        accept="image/*"
        (change)="onImageSelect($event)"
        class="block w-full text-sm file:bg-indigo-50 file:text-indigo-600 file:rounded-full"
      />
    </div>

    <input formControlName="name" placeholder="Name" class="input" />
    <input formControlName="email" placeholder="Email" class="input" />
    <input
      formControlName="password"
      placeholder="New Password (optional)"
      type="password"
      class="input"
    />
    <input formControlName="phone" placeholder="Phone number" class="input" />

    <!-- OPEN POPUP -->
    <button
      type="button"
      (click)="openConfirm()"
      [disabled]="profileForm.invalid"
      class="w-full py-3 rounded-xl font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300"
    >
      Save Changes
    </button>
  </form>
</div>

<!-- 🔐 CONFIRM PASSWORD MODAL -->
<div *ngIf="showConfirm" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl p-6 w-full max-w-sm space-y-4">
    <h3 class="text-lg font-semibold text-gray-800">Confirm Password</h3>

    <input
      type="password"
      [(ngModel)]="confirmPassword"
      placeholder="Enter your password"
      class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none"
    />

    <div class="flex gap-3 justify-end">
      <button type="button" (click)="closeConfirm()" class="px-4 py-2 rounded-lg border">
        Cancel
      </button>

      <button
        type="button"
        (click)="confirmAndSubmit()"
        class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700"
      >
        Confirm
      </button>
    </div>
  </div>
</div>
