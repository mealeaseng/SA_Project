<div class="max-w-xl mx-auto p-8 bg-white rounded-3xl shadow-xl">
  <h2 class="text-2xl font-bold text-slate-800 mb-6">Admin</h2>

  <!-- FLEX WRAPPER -->
  <div class="flex gap-8 items-start">
    <!-- LEFT: AVATAR -->
    <div class="flex flex-col items-center gap-3 shrink-0">
      <img
        *ngIf="imagePreview; else avatar"
        [src]="imagePreview"
        class="w-24 h-24 rounded-full object-cover ring-2 ring-indigo-200"
      />

      <ng-template #avatar>
        <img
          src="assets/avatar.png"
          class="w-24 h-24 rounded-full object-cover ring-2 ring-indigo-200"
        />
      </ng-template>

      <label
        class="px-4 py-2 rounded-full bg-indigo-100 text-indigo-600 text-sm font-medium cursor-pointer hover:bg-indigo-200 transition"
      >
        Change
        <input type="file" accept="image/*" (change)="onImageSelect($event)" class="hidden" />
      </label>
    </div>

    <!-- RIGHT: FORM -->
    <form [formGroup]="profileForm" class="flex-1 space-y-4">
      <input
        formControlName="name"
        type="text"
        placeholder="Name"
        class="w-full px-4 py-3 rounded-2xl bg-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-500/30 outline-none"
      />

      <input
        formControlName="email"
        type="email"
        placeholder="Email"
        class="w-full px-4 py-3 rounded-2xl bg-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-500/30 outline-none"
      />

      <input
        formControlName="password"
        type="password"
        placeholder="New Password (optional)"
        autocomplete="new-password"
        class="w-full px-4 py-3 rounded-2xl bg-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-500/30 outline-none"
      />

      <input
        formControlName="phone"
        type="text"
        placeholder="Phone number"
        class="w-full px-4 py-3 rounded-2xl bg-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-500/30 outline-none"
      />

      <button
        type="button"
        (click)="openConfirm()"
        [disabled]="profileForm.invalid || isSubmitting"
        class="w-full py-3 rounded-2xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 disabled:opacity-50 transition"
      >
        Save Changes
      </button>
    </form>
  </div>
</div>
