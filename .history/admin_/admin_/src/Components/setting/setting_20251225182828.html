<div class="max-w-xl mx-auto p-8 bg-white rounded-3xl shadow-xl">
  <!-- Header -->
  <h2 class="text-2xl font-bold flex items-center gap-2 text-slate-800 mb-6">⚙️ Settings</h2>

  <!-- Avatar -->
  <div class="flex flex-col items-center gap-4 mb-6">
    <img
      *ngIf="imagePreview; else avatar"
      [src]="imagePreview"
      class="w-24 h-24 rounded-full object-cover"
    />

    <ng-template #avatar>
      <img src="assets/avatar.png" class="w-24 h-24 rounded-full object-cover" />
    </ng-template>

    <label
      class="px-5 py-2 rounded-full bg-indigo-100 text-indigo-600 font-medium cursor-pointer hover:bg-indigo-200 transition"
    >
      Choose File
      <input type="file" accept="image/*" (change)="onImageSelect($event)" class="hidden" />
    </label>
  </div>

  <!-- Form -->
  <form [formGroup]="profileForm" class="space-y-4">
    <!-- Name -->
    <input formControlName="name" type="text" placeholder="Name" class="soft-input" />

    <!-- Email -->
    <input formControlName="email" type="email" placeholder="Email" class="soft-input" />

    <!-- Password -->
    <input
      formControlName="password"
      type="password"
      placeholder="New Password (optional)"
      class="soft-input"
    />

    <!-- Phone -->
    <input formControlName="phone" type="text" placeholder="Phone number" class="soft-input" />

    <!-- Save -->
    <button
      type="button"
      (click)="openConfirm()"
      [disabled]="profileForm.invalid"
      class="w-full mt-4 py-3 rounded-2xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      Save Changes
    </button>
  </form>
</div>

<!-- CONFIRM PASSWORD MODAL -->
<div *ngIf="showConfirm" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl space-y-4">
    <h3 class="text-lg font-semibold text-slate-800">Confirm Password</h3>

    <input
      type="password"
      [(ngModel)]="confirmPassword"
      placeholder="Enter your password"
      class="soft-input"
    />

    <div class="flex justify-end gap-3 pt-2">
      <button
        type="button"
        (click)="closeConfirm()"
        class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 transition"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="confirmAndSubmit()"
        class="px-4 py-2 rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 transition"
      >
        Confirm
      </button>
    </div>
  </div>
</div>
