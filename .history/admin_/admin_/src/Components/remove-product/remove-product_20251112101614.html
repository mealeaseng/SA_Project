<div class="p-6 bg-gray-50 min-h-screen">
  <h1 class="text-2xl font-bold text-blue-700 mb-6 text-center">🗑️ Remove Items</h1>

  <!-- ===== Categories ===== -->
  <section class="mb-10">
    <h2 class="text-xl font-semibold text-gray-800 mb-3">🗂️ Categories</h2>
    <ul class="bg-white rounded-lg shadow-sm border border-gray-200 divide-y divide-gray-100">
      <li
        *ngFor="let category of categories; trackBy: trackByFn"
        class="flex justify-between items-center p-3 hover:bg-gray-50 transition"
      >
        <span>{{ category.name_category }}</span>
        <button
          (click)="removeCategory(category._id)"
          class="text-sm text-red-600 hover:text-red-700 font-medium"
        >
          Remove
        </button>
      </li>
    </ul>

    <p *ngIf="categories.length === 0" class="text-gray-400 mt-3 italic">No categories found.</p>
  </section>

  <!-- ===== Products ===== -->
  <section>
    <h2 class="text-xl font-semibold text-gray-800 mb-3">🛒 Products</h2>
    <ul class="bg-white rounded-lg shadow-sm border border-gray-200 divide-y divide-gray-100">
      <li
        *ngFor="let product of products; trackBy: trackByFn"
        class="flex justify-between items-center p-3 hover:bg-gray-50 transition"
      >
        <div>
          <p class="font-medium text-gray-700">{{ product.name_product }}</p>
          <small class="text-gray-500">ID: {{ product.product_id }}</small>
        </div>

        <button
          (click)="removeProduct(product._id)"
          class="text-sm text-red-600 hover:text-red-700 font-medium"
        >
          Remove
        </button>
      </li>
    </ul>

    <p *ngIf="products.length === 0" class="text-gray-400 mt-3 italic">No products found.</p>
  </section>
</div>
