<div class="min-h-screen bg-gray-50 flex flex-col items-center p-6">
  <div class="bg-white shadow-md rounded-xl w-full max-w-md p-6">
    <h2 class="text-2xl font-semibold text-center text-gray-800 mb-6">➕ Add New Category</h2>

    <form (ngSubmit)="onSubmit()" #categoryForm="ngForm" class="space-y-5">
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Category Name</label>
        <input
          type="text"
          name="categoryName"
          [(ngModel)]="category.name"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
          placeholder="Enter category name"
        />
      </div>

      <div>
        <label class="block text-gray-700 mb-1 font-medium">Description</label>
        <textarea
          name="description"
          [(ngModel)]="category.description"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
          rows="3"
          placeholder="Write something..."
        ></textarea>
      </div>

      <button
        type="submit"
        [disabled]="categoryForm.invalid"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-all"
      >
        Add Category
      </button>
    </form>
  </div>
</div>
