<div class="min-h-screen bg-gray-50 flex flex-col items-center p-6">
  <div class="bg-white shadow-md rounded-xl w-full max-w-md p-6">
    <h2 class="text-2xl font-semibold text-center text-gray-800 mb-6">🖼️ Add New Category</h2>

    <form (ngSubmit)="onSubmit()" #categoryForm="ngForm" class="space-y-5">
      <!-- Category Name -->
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Category Name</label>
        <input
          type="text"
          name="name_category"
          [(ngModel)]="category.name_category"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
          placeholder="Enter category name"
        />
      </div>

      <!-- Image Upload -->
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Thumbnail Image</label>
        <input
          type="file"
          (change)="onFileSelected($event)"
          accept="image/*"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 cursor-pointer focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <!-- Preview -->
      <div *ngIf="previewUrl" class="flex justify-center mt-4">
        <img
          [src]="previewUrl"
          alt="Preview"
          class="w-32 h-32 object-cover rounded-lg border border-gray-300 shadow-sm"
        />
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="categoryForm.invalid || !selectedFile"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-all"
      >
        Add Category
      </button>
    </form>
  </div>
</div>
