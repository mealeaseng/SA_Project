<div class="mt-10">
  <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">📂 The Categories</h2>

  <div
    *ngIf="categories && categories.length > 0; else noCategories"
    class="grid sm:grid-cols-2 md:grid-cols-3 gap-4"
  >
    <div
      *ngFor="let category of categories"
      class="bg-white shadow-md hover:shadow-lg transition rounded-lg overflow-hidden border border-gray-200"
    >
      <!-- Category Thumbnail -->
      <img
        [src]="category.thumbnail"
        alt="{{ category.name_category }}"
        class="w-full h-40 object-cover"
      />

      <!-- Category Info -->
      <div class="p-3 flex flex-col items-center">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">
          {{ category.name_category }}
        </h3>
        <button
          (click)="PostProduct(category._id)"
          class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition"
        >
          ➕ Post Product
        </button>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <ng-template #noCategories>
    <div
      class="p-6 bg-gray-50 text-center text-gray-500 border border-dashed border-gray-300 rounded-lg"
    >
      🚫 No categories found. Please add one above.
    </div>
  </ng-template>
</div>
