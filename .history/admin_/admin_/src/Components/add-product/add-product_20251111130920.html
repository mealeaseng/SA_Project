<h2 class="text-xl font-semibold mb-4">🖼️ Post Category & Product</h2>

<div class="flex flex-col gap-3 p-4 bg-white shadow-md rounded-lg w-full max-w-md">
  <!-- Category name input -->
  <input
    type="text"
    [(ngModel)]="categoryName"
    placeholder="Enter Category Name..."
    class="border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500"
  />

  <!-- Image upload -->
  <input
    type="file"
    (change)="onFileSelected($event)"
    accept="image/*"
    class="border border-gray-300 rounded-md px-3 py-2 cursor-pointer"
  />

  <!-- Preview -->
  <div *ngIf="previewUrl" class="flex justify-center">
    <img
      [src]="previewUrl"
      alt="Preview"
      class="w-32 h-32 object-cover rounded-lg border border-gray-300 shadow-sm mt-2"
      class="w-32 h-32 object-cover rounded-lg border border-gray-300 shadow-sm mt-2"
    />
  </div>

  <!-- Submit -->
  <button
    (click)="onSubmit()"
    class="bg-blue-600 text-white font-medium rounded-md py-2 hover:bg-blue-700 transition"
  >
    Submit
  </button>
</div>
