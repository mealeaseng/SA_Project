<h2 class="text-xl font-semibold mb-4">🖼️ Post Category</h2>

<div class="flex flex-col gap-3 p-4 bg-white shadow-md rounded-lg w-full max-w-md">
  <!-- Category name input -->
  <input
    type="text"
    [(ngModel)]="categoryName"
    placeholder="Enter Category Name..."
    class="border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500"
  />

  <!-- Image upload -->
  <input
    type="file"
    (change)="onFileSelected($event)"
    accept="image/*"
    class="border border-gray-300 rounded-md px-3 py-2 cursor-pointer"
  />

  <!-- Preview -->
  <div *ngIf="previewUrl" class="flex justify-center">
    <img
      [src]="previewUrl"
      alt="Preview"
      class="w-32 h-32 object-cover rounded-lg border border-gray-300 shadow-sm mt-2"
    />
  </div>

  <!-- Submit -->
  <button
    (click)="onSubmit()"
    class="bg-blue-600 text-white font-medium rounded-md py-2 hover:bg-blue-700 transition"
  >
    Submit
  </button>
</div>
<div class="mt-10">
  <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">📂 The Categories</h2>

  <div *ngIf="categories && categories.length > 0; else noCategories" class="flex flex-col gap-3">
    <div
      *ngFor="let category of categories"
      class="flex items-center justify-between bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition p-3"
    >
      <!-- Category Info -->
      <div class="flex items-center gap-3">
        <img
          [src]="category.thumbnail"
          alt="{{ category.name_category }}"
          class="w-14 h-14 object-cover rounded-lg border border-gray-300"
        />
        <div>
          <h3 class="text-gray-800 font-semibold text-lg">
            {{ category.name_category }}
          </h3>
          <p class="text-gray-500 text-sm">ID: {{ category._id }}</p>
        </div>
      </div>

      <!-- Post Product Button -->
      <button
        (click)="PostProduct(category._id)"
        class="bg-blue-600 text-white font-medium px-4 py-2 rounded-md hover:bg-blue-700 transition"
      >
        ➕ Post Product
      </button>
    </div>
  </div>

  <!-- No Categories State -->
  <ng-template #noCategories>
    <div
      class="p-6 bg-gray-50 text-center text-gray-500 border border-dashed border-gray-300 rounded-lg"
    >
      🚫 No categories found. Please add one above.
    </div>
  </ng-template>
</div>
