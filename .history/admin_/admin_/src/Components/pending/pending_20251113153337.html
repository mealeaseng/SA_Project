<div class="max-w-4xl mx-auto p-6">
  <h2 class="text-2xl font-bold mb-1">📦 Pending Orders</h2>
  <p class="text-gray-500 mb-6">List of orders waiting for approval</p>

  <div
    *ngFor="let order of orders"
    class="bg-white rounded-xl shadow p-5 flex justify-between items-center mb-4 border border-gray-100"
  >
    <!-- Left -->
    <div>
      <h3 class="text-lg font-semibold">Order #{{ order.id }}</h3>

      <div class="mt-2 space-y-1 text-sm text-gray-700">
        <p><span class="font-bold">User:</span> {{ order.user.name }} ({{ order.user.email }})</p>
        <p>
          <span class="font-bold">Product:</span> {{ order.product.name }} — ${{
            order.product.price
          }}
        </p>
        <p>
          <span class="font-bold">Status:</span>
          <span class="text-yellow-600 font-bold">Pending</span>
        </p>
      </div>
    </div>

    <!-- Right buttons -->
    <div class="flex gap-2">
      <button
        class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition"
        (click)="confirm(order.id)"
      >
        Confirm ✅
      </button>

      <button
        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition"
        (click)="cancel(order.id)"
      >
        Cancel ❌
      </button>
    </div>
  </div>
</div>
