<div class="p-6 bg-gray-50 min-h-screen">
  <h1 class="text-2xl font-bold text-blue-700 mb-6 text-center">👤 User List</h1>

  <ul class="bg-white rounded-lg shadow border divide-y">
    <li
      *ngFor="let user of users; trackBy: trackByFn"
      class="p-4 flex justify-between items-center hover:bg-gray-50"
    >
      <div class="flex gap-4 items-start">
        <img
          [src]="user.profile_img || 'assets/default-user.jpg'"
          class="w-14 h-14 rounded-full object-cover border"
        />

        <div>
          <p class="font-semibold text-lg">{{ user.name_user }}</p>
          <p class="text-sm text-gray-600">📧 {{ user.email }}</p>
          <p class="text-sm text-gray-600">📞 {{ user.phone_number }}</p>
          <p class="text-sm text-gray-600">🏠 {{ user.address }}</p>
          <p class="text-xs text-gray-400">🗓️ {{ user.date | date : 'medium' }}</p>
        </div>
      </div>

      <div class="flex gap-2">
        <button
          (click)="editUser(user)"
          class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
        >
          ✏️ Edit
        </button>

        <button
          (click)="removeUser(user._id)"
          class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600"
        >
          🗑️ Remove
        </button>
      </div>
    </li>
  </ul>

  <p *ngIf="users.length === 0" class="text-center text-gray-400 mt-5">No users found.</p>
</div>

<!-- ================= POPUP ================= -->

<div *ngIf="editPopup" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-6">
    <h2 class="text-xl font-bold mb-4 text-center">✏️ Edit User</h2>

    <form (ngSubmit)="updateUser()" class="space-y-4">
      <!-- NAME -->
      <input
        type="text"
        [(ngModel)]="editUserData.name_user"
        name="name"
        placeholder="Full name"
        class="w-full px-4 py-2 border rounded"
        required
      />

      <!-- EMAIL -->
      <input
        type="email"
        [(ngModel)]="editUserData.email"
        name="email"
        placeholder="Email"
        class="w-full px-4 py-2 border rounded"
        required
      />

      <!-- PHONE -->
      <input
        type="text"
        [(ngModel)]="editUserData.phone_number"
        name="phone"
        placeholder="Phone number"
        class="w-full px-4 py-2 border rounded"
      />

      <!-- ADDRESS -->
      <textarea
        [(ngModel)]="editUserData.address"
        name="address"
        rows="2"
        placeholder="Address"
        class="w-full px-4 py-2 border rounded"
      ></textarea>

      <!-- DATE (READ ONLY) -->
      <input
        type="text"
        [value]="editUserData.date"
        disabled
        class="w-full px-4 py-2 bg-gray-100 border rounded"
      />

      <!-- ACTIONS -->
      <div class="flex justify-end gap-3 pt-4">
        <button type="button" (click)="closeEdit()" class="px-4 py-2 bg-gray-200 rounded">
          Cancel
        </button>
        <button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
          Save
        </button>
      </div>
    </form>
  </div>
</div>
