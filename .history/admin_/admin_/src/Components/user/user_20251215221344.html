<div class="p-6 bg-gray-50 min-h-screen">
  <h1 class="text-2xl font-bold text-blue-700 mb-6 text-center">👤 User List</h1>

  <ul class="bg-white rounded-lg shadow-sm border border-gray-200 divide-y divide-gray-100">
    <li
      *ngFor="let user of users; trackBy: trackByFn"
      class="p-4 flex justify-between items-center hover:bg-gray-50 transition"
    >
      <div>
        <img
          [src]="
            user.profile_img ||
            'https://www.google.com/url?sa=i&url=https%3A%2F%2Fpixabay.com%2Fvectors%2Fblank-profile-picture-mystery-man-973460%2F&psig=AOvVaw0VXlVryNamV3sHTg6Qv6z7&ust=1763005233148000&source=images&cd=vfe&opi=89978449&ved=0CBUQjRxqFwoTCJiVp7bY65ADFQAAAAAdAAAAABAL'
          "
          alt="{{ user.name_user }}"
          class="w-14 h-14 rounded-full object-cover border border-gray-200 shadow-sm"
          onerror="this.src='assets/default-user.jpg'"
        />

        <p class="font-semibold text-gray-800 text-lg">{{ user.name_user }}</p>
        <p class="text-sm text-gray-600">📧 {{ user.email }}</p>
        <p class="text-sm text-red-600">🔒 {{ user.password }}</p>
        <p class="text-sm text-gray-600">📞 {{ user.phone_number }}</p>
        <p class="text-sm text-gray-600">🏠 {{ user.address }}</p>
        <p class="text-xs text-gray-400">🗓️ {{ user.date | date : 'medium' }}</p>
      </div>

      <div class="flex gap-2">
        <button
          (click)="editUser(user)"
          class="flex-1 px-2.5 py-3 mr-6 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded-md transition shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-50"
          aria-label="Edit category {{ user.name_user }}"
        >
          ✏️ Edit
        </button>
        <button
          (click)="removeUser(user._id)"
          class="flex-1 px-2.5 py-1.5 mr-6 bg-red-500 hover:bg-red-600 text-white text-xs rounded-md transition shadow-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-opacity-50"
          aria-label="Delete category {{ user.name_user }}"
        >
          🗑️ Remove
        </button>
      </div>
    </li>
  </ul>

  <p *ngIf="users.length === 0" class="text-center text-gray-400 mt-5 italic">No users found.</p>
</div>

<!-- EDIT USER MODAL -->
<div
  *ngIf="editPopup"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
>
  <!-- MODAL CARD -->
  <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden animate-fadeIn">
    <!-- HEADER -->
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
        ✏️ Edit User Profile
      </h2>
      <button (click)="closeEdit()" class="text-gray-400 hover:text-red-500 transition">✖</button>
    </div>

    <!-- BODY -->
    <form (ngSubmit)="updateUser()" class="p-6 space-y-4">
      <!-- NAME -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1"> Full Name </label>
        <input
          type="text"
          [(ngModel)]="editUserData.name_user"
          name="name"
          class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="Enter full name"
          required
        />
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1"> Email Address </label>
        <input
          type="email"
          [(ngModel)]="editUserData.email"
          name="email"
          class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="example@email.com"
          required
        />
      </div>

      <!-- PHONE -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1"> Phone Number </label>
        <input
          type="text"
          [(ngModel)]="editUserData.phone_number"
          name="phone"
          class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none"
          placeholder="+855 xx xxx xxx"
        />
      </div>

      <!-- ADDRESS -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1"> Address </label>
        <textarea
          rows="2"
          [(ngModel)]="editUserData.address"
          name="address"
          class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"
          placeholder="Enter address"
        ></textarea>
      </div>

      <!-- DATE -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1"> Date </label>
        <input
          type="date"
          [(ngModel)]="editUserData.date"
          name="date"
          class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none"
        />
      </div>

      <!-- ACTION BUTTONS -->
      <div class="flex justify-end gap-3 pt-4">
        <button
          type="button"
          (click)="closeEdit()"
          class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 transition"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="px-5 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium transition shadow"
        >
          💾 Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
